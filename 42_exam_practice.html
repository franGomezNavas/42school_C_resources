<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>42 — Exam Rank 02 Practice</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #00e5ff;
    --accent2: #ff3cac;
    --accent3: #7b61ff;
    --green: #00ff88;
    --yellow: #ffd600;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --l1: #00e5ff;
    --l2: #7b61ff;
    --l3: #ff9500;
    --l4: #ff3cac;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
    z-index:0;
  }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display:flex; align-items:center; gap:20px;
    height: 60px;
  }

  .logo {
    font-family:'Syne',sans-serif;
    font-weight:800; font-size:22px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    letter-spacing:-1px;
  }

  .header-subtitle { color:var(--muted); font-size:11px; }

  .progress-bar-wrap {
    flex:1; height:4px;
    background: var(--border); border-radius:99px; overflow:hidden;
    max-width:300px; margin-left:auto;
  }
  .progress-bar {
    height:100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius:99px;
    transition: width 0.4s ease;
  }
  .progress-text { color:var(--muted); font-size:11px; white-space:nowrap; }

  /* LAYOUT */
  .layout {
    display:grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 60px);
    position:relative; z-index:1;
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 16px 0;
    overflow-y: auto;
    position:sticky;
    top:60px;
    height: calc(100vh - 60px);
  }

  .level-section { margin-bottom:8px; }

  .level-header {
    padding: 8px 16px;
    font-family:'Syne',sans-serif;
    font-size:10px; font-weight:600;
    letter-spacing:2px; text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
  }

  .level-dot {
    width:8px; height:8px; border-radius:50%;
    flex-shrink:0;
  }

  .ex-btn {
    width:100%;
    background:none; border:none;
    padding: 7px 16px 7px 32px;
    text-align:left; cursor:pointer;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    transition: all 0.15s;
    display:flex; align-items:center; gap:8px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .ex-btn:hover { color:var(--text); background: var(--surface2); }
  .ex-btn.active { color:var(--accent); background: rgba(0,229,255,0.08); }
  .ex-btn.done { color:var(--green); }
  .ex-btn.done::before { content:'✓'; color:var(--green); }

  /* MAIN */
  .main {
    padding: 32px;
    max-width: 900px;
  }

  /* HOME */
  .home-view { }

  .home-title {
    font-family:'Syne',sans-serif;
    font-size:36px; font-weight:800;
    line-height:1.1; margin-bottom:8px;
  }

  .home-title span {
    background: linear-gradient(135deg, var(--accent), var(--accent3), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }

  .home-desc { color:var(--muted); margin-bottom:32px; line-height:1.7; font-size:13px; }

  .level-cards {
    display:grid; grid-template-columns: repeat(2, 1fr);
    gap:16px; margin-bottom:32px;
  }

  .level-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:12px; padding:20px;
    cursor:pointer; transition: all 0.2s;
    position:relative; overflow:hidden;
  }

  .level-card::before {
    content:''; position:absolute;
    inset:0; opacity:0;
    transition: opacity 0.2s;
  }

  .level-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .level-card:hover::before { opacity:1; }

  .lc-l { font-size:10px; letter-spacing:2px; font-weight:600; margin-bottom:8px; }
  .lc-name { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; margin-bottom:4px; }
  .lc-count { color:var(--muted); font-size:12px; }
  .lc-badge {
    display:inline-block;
    padding:2px 10px; border-radius:99px;
    font-size:10px; font-weight:600;
    margin-top:12px;
  }

  /* EXERCISE VIEW */
  .ex-view { }

  .ex-breadcrumb {
    font-size:11px; color:var(--muted);
    margin-bottom:20px;
    display:flex; align-items:center; gap:8px;
  }

  .ex-header {
    display:flex; align-items:flex-start;
    justify-content:space-between; gap:16px;
    margin-bottom:24px;
  }

  .ex-title {
    font-family:'Syne',sans-serif;
    font-size:28px; font-weight:800;
  }

  .level-badge {
    flex-shrink:0;
    padding:4px 14px; border-radius:99px;
    font-size:11px; font-weight:600;
    font-family:'Syne',sans-serif;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:12px; margin-bottom:16px;
    overflow:hidden;
  }

  .section-header {
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
    font-size:12px; font-weight:600; letter-spacing:1px;
    text-transform:uppercase;
  }

  .section-icon { font-size:16px; }

  .section-body { padding:20px; }

  .enunciado {
    font-size:13px; line-height:1.8; color:var(--text);
    white-space: pre-wrap;
  }

  .code-block {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius:8px; padding:16px;
    font-size:12px; line-height:1.8;
    overflow-x:auto;
    position:relative;
  }

  .copy-btn {
    position:absolute; top:10px; right:10px;
    background:var(--surface2); border:1px solid var(--border);
    color:var(--muted); cursor:pointer;
    padding:4px 10px; border-radius:6px;
    font-size:10px; font-family:'JetBrains Mono',monospace;
    transition:all 0.15s;
  }
  .copy-btn:hover { color:var(--accent); border-color:var(--accent); }

  /* syntax highlight classes */
  .kw { color: #ff79c6; }
  .fn { color: #50fa7b; }
  .ty { color: #8be9fd; }
  .cm { color: var(--muted); font-style:italic; }
  .st { color: #f1fa8c; }
  .nu { color: #bd93f9; }
  .pp { color: #ffb86c; }

  .hints-toggle {
    background:none; border:1px solid var(--border);
    color:var(--muted); cursor:pointer;
    padding:10px 20px; border-radius:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px; width:100%;
    text-align:left; margin-bottom:8px;
    transition:all 0.2s;
    display:flex; align-items:center; gap:10px;
  }

  .hints-toggle:hover { border-color:var(--yellow); color:var(--yellow); }

  .hint-item {
    background: rgba(255,214,0,0.05);
    border-left: 3px solid var(--yellow);
    padding:10px 14px; margin:8px 0;
    border-radius:0 6px 6px 0;
    font-size:12px; line-height:1.7;
  }

  .hidden { display:none; }

  .nav-btns {
    display:flex; gap:12px; margin-top:24px;
  }

  .btn {
    padding:10px 24px; border-radius:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px; cursor:pointer;
    border:none; transition:all 0.15s;
    font-weight:600;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    color: var(--bg);
  }
  .btn-primary:hover { opacity:0.85; transform:translateY(-1px); }

  .btn-secondary {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text);
  }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }

  .btn-done {
    background:rgba(0,255,136,0.1); border:1px solid var(--green);
    color:var(--green);
  }

  .example-io {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
    margin-top:12px;
  }

  .io-block {
    background:#0d0d14; border:1px solid var(--border);
    border-radius:8px; padding:12px; font-size:12px;
  }

  .io-label { color:var(--muted); font-size:10px; margin-bottom:6px; }

  /* FILTER */
  .filter-bar {
    display:flex; gap:8px; margin-bottom:24px;
    flex-wrap:wrap;
  }

  .filter-chip {
    padding:5px 14px; border-radius:99px;
    font-size:11px; cursor:pointer;
    border:1px solid var(--border);
    background:none; color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    transition:all 0.15s;
  }
  .filter-chip.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.08); }

  .search-input {
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); padding:8px 14px; border-radius:8px;
    font-family:'JetBrains Mono',monospace; font-size:12px;
    outline:none; width:200px;
    transition:border-color 0.2s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--muted); }

  @media(max-width:700px){
    .layout { grid-template-columns:1fr; }
    .sidebar { display:none; }
    .level-cards { grid-template-columns:1fr; }
    .example-io { grid-template-columns:1fr; }
  }
</style>

<script>
const EXERCISES = [
  // ===== LEVEL 1 =====
  {
    id:'fizzbuzz', level:1,
    title:'fizzbuzz',
    enunciado:`Escribe un programa que imprima los números del 1 al 100, uno por línea.

• Si el número es múltiplo de 3: imprime "fizz"
• Si es múltiplo de 5: imprime "buzz"
• Si es múltiplo de 3 Y 5: imprime "fizzbuzz"
• Si no: imprime el número

Archivo: fizzbuzz.c`,
    solucion:`#include <unistd.h>

void\tft_putnbr(int n)
{
\tif (n >= 10)
\t\tft_putnbr(n / 10);
\tchar c = '0' + (n % 10);
\tunistd.h is needed. write(1, &c, 1);
}

// Forma más limpia con write:
void\tput(char *s)
{
\tint i = 0;
\twhile (s[i]) write(1, &s[i++], 1);
}

void\tputnbr(int n)
{
\tchar c;
\tif (n >= 10) putnbr(n / 10);
\tc = '0' + n % 10;
\twrite(1, &c, 1);
}

int\tmain(void)
{
\tint i = 1;
\twhile (i <= 100)
\t{
\t\tif (i % 15 == 0) put("fizzbuzz");
\t\telse if (i % 3 == 0) put("fizz");
\t\telse if (i % 5 == 0) put("buzz");
\t\telse putnbr(i);
\t\twrite(1, "\\n", 1);
\t\ti++;
\t}
\treturn (0);
}`,
    hints:[
      '⚡ Comprueba % 15 ANTES que % 3 y % 5 — si no, fizzbuzz nunca se ejecuta.',
      '🔢 Para imprimir números sin printf: divide recursivamente entre 10 y añade el carácter \'0\' + digito.',
      '📁 Sin includes de stdio.h — solo #include <unistd.h> para write().',
    ],
    ejemplo:'1\\n2\\nfizz\\n4\\nbuzz\\nfizz\\n7\\n8\\nfizz\\nbuzz\\n11\\nfizz\\n13\\n14\\nfizzbuzz\\n...'
  },
  {
    id:'rotone', level:1,
    title:'rotone',
    enunciado:`Escribe un programa que recibe una cadena como argumento y muestra esa cadena con cada letra desplazada una posición en el alfabeto.

• 'z' se convierte en 'a', 'Z' en 'A'
• Los no-alfabéticos se mantienen igual
• Si no hay argumento: imprime solo un newline

Archivo: rotone.c`,
    solucion:`#include <unistd.h>

int\tmain(int argc, char **argv)
{
\tint\t\ti;
\tchar\tc;

\tif (argc == 2)
\t{
\t\ti = 0;
\t\twhile (argv[1][i])
\t\t{
\t\t\tc = argv[1][i];
\t\t\tif (c >= 'a' && c <= 'z')
\t\t\t\tc = (c - 'a' + 1) % 26 + 'a';
\t\t\telse if (c >= 'A' && c <= 'Z')
\t\t\t\tc = (c - 'A' + 1) % 26 + 'A';
\t\t\twrite(1, &c, 1);
\t\t\ti++;
\t\t}
\t}
\twrite(1, "\\n", 1);
\treturn (0);
}`,
    hints:[
      '🔁 Fórmula mágica: (c - \'a\' + 1) % 26 + \'a\' — esto maneja el wrap de z→a automáticamente.',
      '🔡 Trata minúsculas y mayúsculas por separado. Los demás caracteres: copia tal cual.',
      '⚠️ Si argc != 2, imprime SOLO un newline — no salgas sin él.',
    ],
    ejemplo:`$> ./rotone "Hello World!"
Ifmmp Xpsme!`
  },
  {
    id:'rot_13', level:1,
    title:'rot_13',
    enunciado:`Escribe un programa que recibe una cadena y la muestra cifrada con ROT13.

ROT13: cada letra se desplaza 13 posiciones. Aplicado dos veces, vuelve al original.
• Los no-alfabéticos se mantienen igual
• Sin argumento: imprime solo newline

Archivo: rot_13.c`,
    solucion:`#include <unistd.h>

int\tmain(int argc, char **argv)
{
\tint\ti;
\tchar c;

\tif (argc == 2)
\t{
\t\ti = 0;
\t\twhile (argv[1][i])
\t\t{
\t\t\tc = argv[1][i];
\t\t\tif (c >= 'a' && c <= 'z')
\t\t\t\tc = (c - 'a' + 13) % 26 + 'a';
\t\t\telse if (c >= 'A' && c <= 'Z')
\t\t\t\tc = (c - 'A' + 13) % 26 + 'A';
\t\t\twrite(1, &c, 1);
\t\t\ti++;
\t\t}
\t}
\twrite(1, "\\n", 1);
\treturn (0);
}`,
    hints:[
      '🔁 Idéntico a rotone pero con +13 en vez de +1. La fórmula % 26 funciona igual.',
      '✅ ROT13 es simétrico: aplicado dos veces da el original. Úsalo para testear.',
      '📌 "Hello" → "Uryyb"',
    ],
    ejemplo:`$> ./rot_13 "Hello World!"
Uryyb Jbeyq!`
  },
  {
    id:'first_word', level:1,
    title:'first_word',
    enunciado:`Escribe un programa que recibe una cadena y muestra su primera palabra, seguida de un newline.

• "Palabra" = secuencia de caracteres ASCII imprimibles sin espacios ni tabs
• Si no hay argumentos o no hay palabras: solo newline

Archivo: first_word.c`,
    solucion:`#include <unistd.h>

int\tmain(int argc, char **argv)
{
\tint i;

\tif (argc == 2)
\t{
\t\ti = 0;
\t\twhile (argv[1][i] == ' ' || argv[1][i] == '\\t')
\t\t\ti++;
\t\twhile (argv[1][i] && argv[1][i] != ' ' && argv[1][i] != '\\t')
\t\t{
\t\t\twrite(1, &argv[1][i], 1);
\t\t\ti++;
\t\t}
\t}
\twrite(1, "\\n", 1);
\treturn (0);
}`,
    hints:[
      '🧭 Dos bucles: primero salta espacios/tabs del inicio, luego imprime hasta el próximo espacio/tab.',
      '⚠️ Los separadores son espacio Y tab (\\t), no solo espacio.',
      '📌 "  hello world" → "hello"',
    ],
    ejemplo:`$> ./first_word "    hello world"
hello`
  },
  {
    id:'last_word', level:2,
    title:'last_word',
    enunciado:`Escribe un programa que recibe una cadena y muestra su última palabra, seguida de newline.

• Si no hay argumentos o no hay palabras: solo newline
• Los separadores son espacios y/o tabs

Archivo: last_word.c`,
    solucion:`#include <unistd.h>

int\tmain(int argc, char **argv)
{
\tint i;
\tint end;

\tif (argc == 2)
\t{
\t\ti = 0;
\t\twhile (argv[1][i]) i++;
\t\ti--;
\t\twhile (i >= 0 && (argv[1][i] == ' ' || argv[1][i] == '\\t'))
\t\t\ti--;
\t\tend = i;
\t\twhile (i >= 0 && argv[1][i] != ' ' && argv[1][i] != '\\t')
\t\t\ti--;
\t\ti++;
\t\twhile (i <= end)
\t\t{
\t\t\twrite(1, &argv[1][i], 1);
\t\t\ti++;
\t\t}
\t}
\twrite(1, "\\n", 1);
\treturn (0);
}`,
    hints:[
      '↩️ Estrategia: ve al final del string, salta trailing spaces, luego retrocede hasta el inicio de la última palabra.',
      '📍 Guarda el índice del final de la palabra (end), luego imprime desde el inicio encontrado hasta end.',
      '📌 "hello world  " → "world"',
    ],
    ejemplo:`$> ./last_word "hello world  "
world`
  },
  {
    id:'putstr', level:1,
    title:'ft_putstr / putstr',
    enunciado:`Escribe una función que muestre el string pasado como parámetro, usando write().

Prototipo: void ft_putstr(char *str);

Archivo: ft_putstr.c`,
    solucion:`#include <unistd.h>

void\tft_putstr(char *str)

  {
    id:'repeat_alpha', level:1,
    title:'repeat_alpha',
    enunciado:`Escribe un programa que recibe una cadena y muestra cada carácter seguido de tantas repeticiones como su posición en el alfabeto (a=1, b=2, ..., z=26).

• Los no-alfabéticos se muestran tal cual sin repetición
• Sin argumento: solo newline
• Case-insensitive para la posición (a y A = posición 1)

Archivo: repeat_alpha.c`,
    solucion:`#include <unistd.h>

int\tmain(int argc, char **argv)
{
\tint i;
\tint j;
\tint rep;

\tif (argc == 2)
\t{
\t\ti = 0;
\t\twhile (argv[1][i])
\t\t{
\t\t\tif ((argv[1][i] >= 'a' && argv[1][i] <= 'z') ||
\t\t\t\t(argv[1][i] >= 'A' && argv[1][i] <= 'Z'))
\t\t\t{
\t\t\t\tif (argv[1][i] >= 'a') rep = argv[1][i] - 'a' + 1;
\t\t\t\telse rep = argv[1][i] - 'A' + 1;
\t\t\t\tj = 0;
\t\t\t\twhile (j < rep)
\t\t\t\t{
\t\t\t\t\twrite(1, &argv[1][i], 1);
\t\t\t\t\tj++;
\t\t\t\t}
\t\t\t}
\t\t\telse write(1, &argv[1][i], 1);
\t\t\ti++;
\t\t}
\t}
\twrite(1, "\\n", 1);
\treturn (0);

    id:'ft_split', level:4,
    title:'ft_split',
    enunciado:`Escribe una función que divide un string usando un charset de delimitadores, y devuelve un array de strings.

Prototipo: char **ft_split(char *str, char *charset);

• El array termina en NULL
• Si str es NULL: devuelve NULL
• Los separadores son cualquier carácter en charset

Archivo: ft_split.c`,
    solucion:`#include <stdlib.h>

int\tis_sep(char c, char *sep)
{
\tint i = 0;
\twhile (sep[i])
\t\tif (sep[i++] == c) return 1;
\treturn 0;
}

int\tcount_words(char *s, char *sep)
{
\tint count = 0;
\tint in_word = 0;
\tint i = 0;
\twhile (s[i])
\t{
\t\tif (!is_sep(s[i], sep) && !in_word) { count++; in_word = 1; }
\t\telse if (is_sep(s[i], sep)) in_word = 0;
\t\ti++;
\t}
\treturn count;
}

char\t*get_word(char *s, int start, int end)
{
\tchar *w = (char *)malloc(end - start + 1);
\tif (!w) return NULL;
\tint i = 0;
\twhile (start < end) w[i++] = s[start++];
\tw[i] = '\\0';
\treturn w;
}

char\t**ft_split(char *str, char *charset)
{
\tif (!str) return NULL;
\tint words = count_words(str, charset);
\tchar **res = (char **)malloc(sizeof(char *) * (words + 1));
\tif (!res) return NULL;
\tint i = 0, j = 0, start;
\twhile (j < words)
\t{
\t\twhile (is_sep(str[i], charset)) i++;
\t\tstart = i;
\t\twhile (str[i] && !is_sep(str[i], charset)) i++;
\t\tres[j++] = get_word(str, start, i);
\t}
\tres[j] = NULL;
\treturn res;
}`,
    hints:[
      '🧩 Tres partes: contar palabras, alocar array, extraer cada palabra.',
      '📌 ft_split("hello world", " ") → ["hello", "world", NULL]',
      '⚠️ charset puede tener múltiples separadores. is_sep() comprueba si c está en charset.',
    ],
    ejemplo:`char **r = ft_split("one,two,,three", ",");
// ["one", "two", "three", NULL]`
  },

int\tmain(int argc, char **argv)

\tif (argc == 2)\n\t{\n\t\ti = 0;\n\t\twhile (argv[1][i] == ' ' || argv[1][i] == '\\t') i++;\n\t\tstart = i;\n\t\twhile (argv[1][i] && argv[1][i] != ' ' && argv[1][i] != '\\t') i++;\n\t\tfirst_end = i;\n\t\twhile (argv[1][i])\n\t\t{\n\t\t\tif (argv[1][i] != ' ' && argv[1][i] != '\\t')\n\t\t\t{\n\t\t\t\twrite(1, &argv[1][i], 1);\n\t\t\t}\n\t\t\telse if (argv[1][i + 1] && argv[1][i + 1] != ' ' && argv[1][i + 1] != '\\t')\n\t\t\t{\n\t\t\t\twrite(1, " ", 1);\n\t\t\t}\n\t\t\ti++;\n\t\t}\n\t\tif (first_end > start)\n\t\t{\n\t\t\twrite(1, " ", 1);\n\t\t\ti = start;\n\t\t\twhile (i < first_end)\n\t\t\t{\n\t\t\t\twrite(1, &argv[1][i], 1);\n\t\t\t\ti++;\n\t\t\t}\n\t\t}\n\t}\n\twrite(1, "\\n", 1);\n\treturn (0);\n}`,

Archivo: rev_wstr.c`,

int\tword_len(char *s)
{
\tint i = 0;\n\twhile (s[i] && s[i] != ' ' && s[i] != '\\t') i++;\n\treturn i;\n}\n\nvoid\tprint_word(char *s, int len)\n{\n\tint i = 0;\n\twhile (i < len) { write(1, &s[i], 1); i++; }\n}\n\nint\tmain(int argc, char **argv)\n{\n\tint i;\n\tint printed;\n\n\tif (argc == 2)\n\t{\n\t\ti = 0;\n\t\twhile (argv[1][i]) i++;\n\t\ti--;\n\t\tprinted = 0;\n\t\twhile (i >= 0)\n\t\t{\n\t\t\twhile (i >= 0 && (argv[1][i] == ' ' || argv[1][i] == '\\t')) i--;\n\t\t\tif (i >= 0)\n\t\t\t{\n\t\t\t\tint end = i;\n\t\t\t\twhile (i >= 0 && argv[1][i] != ' ' && argv[1][i] != '\\t') i--;\n\t\t\t\tif (printed) write(1, " ", 1);\n\t\t\t\tprint_word(&argv[1][i + 1], end - i);\n\t\t\t\tprinted = 1;\n\t\t\t}\n\t\t}\n\t}\n\twrite(1, "\\n", 1);\n\treturn (0);\n}`,

Prototipo: void flood_fill(char **tab, t_point size, t_point begin);

Donde t_point es: typedef struct { int x; int y; } t_point;

• Reemplaza todos los caracteres conectados al punto begin (mismo carácter) con 'F'
• Conectividad: 4 direcciones (arriba, abajo, izquierda, derecha)

Archivo: flood_fill.c`,
    solucion:`typedef struct\ts_point {\n\tint x;\n\tint y;\n} t_point;\n\nvoid\tflood_fill(char **tab, t_point size, t_point begin)\n{\n\tchar\ttarget;\n\n\ttarget = tab[begin.y][begin.x];\n\tif (target == 'F') return;\n\ttab[begin.y][begin.x] = 'F';\n\tif (begin.x > 0) {\n\t\tt_point p = {begin.x - 1, begin.y};\n\t\tif (tab[p.y][p.x] == target) flood_fill(tab, size, p);\n\t}\n\tif (begin.x < size.x - 1) {\n\t\tt_point p = {begin.x + 1, begin.y};\n\t\tif (tab[p.y][p.x] == target) flood_fill(tab, size, p);\n\t}\n\tif (begin.y > 0) {\n\t\tt_point p = {begin.x, begin.y - 1};\n\t\tif (tab[p.y][p.x] == target) flood_fill(tab, size, p);\n\t}\n\tif (begin.y < size.y - 1) {\n\t\tt_point p = {begin.x, begin.y + 1};\n\t\tif (tab[p.y][p.x] == target) flood_fill(tab, size, p);\n\t}\n}`,

      '📌 tab[y][x] — primero y (fila), luego x (columna).',

// begin: (0,0)

// ======================== STATE ========================
const done = JSON.parse(localStorage.getItem('42_done') || '[]');
let currentId = null;
const LEVELS = [1,2,3,4];
const LEVEL_NAMES = { 1:'Nivel 1', 2:'Nivel 2', 3:'Nivel 3', 4:'Nivel 4' };
const LEVEL_COLORS = { 1:'var(--l1)', 2:'var(--l2)', 3:'var(--l3)', 4:'var(--l4)' };

function markDone(id) {
  if (!done.includes(id)) {
    done.push(id);
    localStorage.setItem('42_done', JSON.stringify(done));
  }
  renderSidebar();
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((done.length / EXERCISES.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = done.length + ' / ' + EXERCISES.length;
}

// ======================== SIDEBAR ========================
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  LEVELS.forEach(lv => {
    const exs = EXERCISES.filter(e => e.level === lv);
    const div = document.createElement('div');
    div.className = 'level-section';
    div.innerHTML = `<div class="level-header">
      <div class="level-dot" style="background:${LEVEL_COLORS[lv]}"></div>
      ${LEVEL_NAMES[lv]}
    </div>`;
    exs.forEach(ex => {
      const btn = document.createElement('button');
      btn.className = 'ex-btn' + (currentId === ex.id ? ' active' : '') + (done.includes(ex.id) ? ' done' : '');
      btn.textContent = (done.includes(ex.id) ? '✓ ' : '') + ex.title;
      btn.onclick = () => showExercise(ex.id);
      div.appendChild(btn);
    });
    sb.appendChild(div);
  });
}

// ======================== HOME ========================
function showHome() {
  currentId = null;
  renderSidebar();
  const mc = document.getElementById('mainContent');
  const levelStats = LEVELS.map(lv => {
    const exs = EXERCISES.filter(e => e.level === lv);
    const doneCount = exs.filter(e => done.includes(e.id)).length;
    return { lv, exs, doneCount };
  });

  mc.innerHTML = `
    <div class="home-view">
      <div class="home-title">Exam Rank 02<br><span>Practice Mode</span></div>
      <p class="home-desc">Todos los ejercicios del examen de 42. Con enunciados, soluciones y pistas. 6 días, tú puedes.<br>
      <strong style="color:var(--accent)">Consejo:</strong> practica escribir sin mirar la solución. Usa las pistas solo si te bloqueas.</p>
      <div class="level-cards">
        ${levelStats.map(({lv, exs, doneCount}) => `
          <div class="level-card" onclick="showLevel(${lv})" style="border-top:3px solid ${LEVEL_COLORS[lv]}">
            <div class="lc-l" style="color:${LEVEL_COLORS[lv]}">NIVEL ${lv}</div>
            <div class="lc-name">${exs.length} ejercicios</div>
            <div class="lc-count">${doneCount}/${exs.length} completados</div>
            <div class="lc-badge" style="background:${LEVEL_COLORS[lv]}22;color:${LEVEL_COLORS[lv]}">
              ${lv===1?'Básico':lv===2?'Intermedio':lv===3?'Avanzado':'Experto'}
            </div>
          </div>
        `).join('')}
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:2px;">Estructura del examen</div>
        <div style="font-size:13px;line-height:2;color:var(--text);">
          En el examen se te dan <strong style="color:var(--accent)">4 ejercicios</strong>, uno de cada nivel.<br>
          El nivel 1 y 2 son casi seguros. El 3 y 4 requieren más práctica.<br>
          Tienes <strong style="color:var(--accent)">3 intentos</strong> por ejercicio.<br>
          Tiempo total: <strong style="color:var(--accent)">3 horas</strong>.
        </div>
      </div>
    </div>
  `;
}

function showLevel(lv) {
  showExercise(EXERCISES.find(e => e.level === lv).id);
}

// ======================== EXERCISE ========================
function showExercise(id) {
  currentId = id;
  renderSidebar();
  const ex = EXERCISES.find(e => e.id === id);
  const mc = document.getElementById('mainContent');
  const lvColor = LEVEL_COLORS[ex.level];

  // Find nav
  const allEx = EXERCISES;
  const idx = allEx.findIndex(e => e.id === id);
  const prev = allEx[idx - 1];
  const next = allEx[idx + 1];

  mc.innerHTML = `
    <div class="ex-view">
      <div class="ex-breadcrumb">
        <span style="cursor:pointer;color:var(--accent)" onclick="showHome()">🏠 Inicio</span>
        <span>›</span>
        <span>Nivel ${ex.level}</span>
        <span>›</span>
        <span style="color:var(--text)">${ex.title}</span>
      </div>

      <div class="ex-header">
        <div class="ex-title">${ex.title}</div>
        <div class="level-badge" style="background:${lvColor}22;color:${lvColor};border:1px solid ${lvColor}44">
          Nivel ${ex.level}
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-icon">📋</span>
          ENUNCIADO
        </div>
        <div class="section-body">
          <div class="enunciado">${ex.enunciado}</div>
          ${ex.ejemplo ? `<div style="margin-top:16px;">
            <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;">EJEMPLO</div>
            <div class="code-block"><pre>${ex.ejemplo}</pre></div>
          </div>` : ''}
        </div>
      </div>

      <div style="margin-bottom:16px;">
        ${ex.hints.map((h,i) => `
          <div class="hint-item" id="hint_${i}" style="display:none">${h}</div>
        `).join('')}
        <button class="hints-toggle" onclick="toggleHints(${ex.hints.length})">
          💡 Ver pistas (${ex.hints.length} disponibles)
        </button>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-icon">✅</span>
          SOLUCIÓN
          <span style="margin-left:auto;font-size:10px;color:var(--muted)">Intenta resolverlo antes de mirar</span>
        </div>
        <div class="section-body">
          <div class="code-block" id="solutionBlock" style="display:none">
            <button class="copy-btn" onclick="copySolution()">Copiar</button>
            <pre id="solutionCode">${ex.solucion}</pre>
          </div>
          <button class="btn btn-secondary" id="showSolBtn" onclick="toggleSolution()">
            🔒 Mostrar solución
          </button>
        </div>
      </div>

      <div class="nav-btns">
        ${prev ? `<button class="btn btn-secondary" onclick="showExercise('${prev.id}')">← ${prev.title}</button>` : ''}
        <button class="btn ${done.includes(id) ? 'btn-done' : 'btn-primary'}" onclick="markDone('${id}')">
          ${done.includes(id) ? '✓ Completado' : '✅ Marcar como completado'}
        </button>
        ${next ? `<button class="btn btn-secondary" onclick="showExercise('${next.id}')">${next.title} →</button>` : ''}
      </div>
    </div>
  `;

  window.scrollTo(0,0);
}

let hintsShown = 0;
function toggleHints(total) {
  if (hintsShown < total) {
    document.getElementById('hint_' + hintsShown).style.display = 'block';
    hintsShown++;
  } else {
    // reset
    for(let i=0;i<total;i++) {
      const el = document.getElementById('hint_' + i);
      if(el) el.style.display = 'none';
    }
    hintsShown = 0;
  }
}

function toggleSolution() {
  const block = document.getElementById('solutionBlock');
  const btn = document.getElementById('showSolBtn');
  if (block.style.display === 'none') {
    block.style.display = 'block';
    btn.textContent = '🔓 Ocultar solución';
  } else {
    block.style.display = 'none';
    btn.textContent = '🔒 Mostrar solución';
  }
}

function copySolution() {
  const code = document.getElementById('solutionCode').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '¡Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 1500);
  });
}

// INIT
showHome();
updateProgress();
</script>
</body>
</html>
