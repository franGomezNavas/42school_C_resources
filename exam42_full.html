const EX = [
{id:'fizzbuzz',level:1,title:'fizzbuzz',
enunciado:`Escribe un programa que imprima los números del 1 al 100, uno por línea.
• Si múltiplo de 3 → "fizz"
• Si múltiplo de 5 → "buzz"
• Si múltiplo de 3 Y 5 → "fizzbuzz"
• Si no → el número
Archivo: fizzbuzz.c`,
sol:`#include <unistd.h>\n\nvoid\tput(char *s) { int i=0; while(s[i]) write(1,&s[i++],1); }\n\nvoid\tputnbr(int n) { char c; if(n>=10) putnbr(n/10); c='0'+n%10; write(1,&c,1); }\n\nint\tmain(void)\n{\n\tint i=1;\n\twhile(i<=100)\n\t{\n\t\tif(i%15==0)     put("fizzbuzz");\n\t\telse if(i%3==0) put("fizz");\n\t\telse if(i%5==0) put("buzz");\n\t\telse            putnbr(i);\n\t\twrite(1,"\\n",1);\n\t\ti++;\n\t}\n\treturn(0);\n}`,
hints:['⚡ Comprueba % 15 ANTES que % 3 y % 5 — si no, fizzbuzz nunca se ejecuta.','🔢 Para imprimir números: divide recursivamente entre 10 y añade \'0\' + dígito.','📁 Solo #include <unistd.h> — usa write() para todo, sin printf.'],
ejemplo:`1\n2\nfizz\n4\nbuzz\nfizz\n...\n14\nfizzbuzz`},

{id:'rotone',level:1,title:'rotone',
enunciado:`Escribe un programa que recibe una cadena y muestra cada letra desplazada +1 en el alfabeto.
• 'z'→'a', 'Z'→'A'. No-alfabéticos: igual.
• Sin argumento: solo newline.
Archivo: rotone.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c>='a'&&c<='z') c=(c-'a'+1)%26+'a';\n\t\t\telse if(c>='A'&&c<='Z') c=(c-'A'+1)%26+'A';\n\t\t\twrite(1,&c,1);\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔁 Fórmula: (c - \'a\' + 1) % 26 + \'a\' — el % 26 maneja el wrap z→a.','🔡 Trata minúsculas y mayúsculas por separado. Resto: copia tal cual.','⚠️ Si argc != 2, imprime SOLO un newline.'],
ejemplo:`$> ./rotone "Hello World!"\nIfmmp Xpsme!`},

{id:'rot_13',level:1,title:'rot_13',
enunciado:`Escribe un programa que recibe una cadena y la muestra cifrada con ROT13.
• Cada letra se desplaza 13 posiciones. No-alfabéticos: igual.
• Sin argumento: solo newline.
Archivo: rot_13.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c>='a'&&c<='z') c=(c-'a'+13)%26+'a';\n\t\t\telse if(c>='A'&&c<='Z') c=(c-'A'+13)%26+'A';\n\t\t\twrite(1,&c,1);\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔁 Idéntico a rotone pero con +13. La fórmula % 26 funciona igual.','✅ ROT13 es simétrico: aplicado dos veces da el original. Úsalo para testear.','📌 "Hello" → "Uryyb"'],
ejemplo:`$> ./rot_13 "Hello World!"\nUryyb Jbeyq!`},

{id:'first_word',level:1,title:'first_word',
enunciado:`Escribe un programa que recibe una cadena y muestra su primera palabra seguida de newline.
• Separadores: espacio y tab.
• Sin argumentos o sin palabras: solo newline.
Archivo: first_word.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i]==' '||argv[1][i]=='\\t') i++;\n\t\twhile(argv[1][i]&&argv[1][i]!=' '&&argv[1][i]!='\\t')\n\t\t{ write(1,&argv[1][i],1); i++; }\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🧭 2 bucles: primero salta espacios/tabs iniciales, luego imprime hasta el próximo separador.','⚠️ Separadores: espacio Y tab (\\t) — no solo espacio.','📌 "   hello world" → "hello"'],
ejemplo:`$> ./first_word "    hello world"\nhello`},

{id:'rev_print',level:1,title:'rev_print',
enunciado:`Escribe un programa que recibe una cadena y la muestra al revés seguida de newline.
• Sin argumentos: solo newline.
Archivo: rev_print.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i]) i++;\n\t\twhile(i>0){ i--; write(1,&argv[1][i],1); }\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['📐 Primero calcula la longitud (i llega al \\0), luego decrece i e imprime.','🔁 while(i>0){ i--; write...; } — decrementa ANTES de imprimir.','📌 "Hello" → "olleH"'],
ejemplo:`$> ./rev_print "Hello"\nolleH`},

{id:'repeat_alpha',level:1,title:'repeat_alpha',
enunciado:`Escribe un programa que recibe una cadena y muestra cada carácter repetido N veces según su posición en el alfabeto (a=1, b=2, ..., z=26).
• No-alfabéticos: se muestran una vez.
• Sin argumento: solo newline.
Archivo: repeat_alpha.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i,j,rep; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c>='a'&&c<='z') rep=c-'a'+1;\n\t\t\telse if(c>='A'&&c<='Z') rep=c-'A'+1;\n\t\t\telse rep=1;\n\t\t\tj=0;\n\t\t\twhile(j<rep){ write(1,&c,1); j++; }\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔡 rep = c - \'a\' + 1 para minúsculas, c - \'A\' + 1 para mayúsculas, 1 para el resto.','🔁 Loop interior: imprime el mismo carácter rep veces.','📌 "ab" → "abb" (a×1, b×2)'],
ejemplo:`$> ./repeat_alpha "ab"\nabb`},

{id:'putstr',level:1,title:'ft_putstr',
enunciado:`Escribe una función que muestre el string pasado como parámetro usando write().
Prototipo: void ft_putstr(char *str);
Archivo: ft_putstr.c`,
sol:`#include <unistd.h>\n\nvoid\tft_putstr(char *str)\n{\n\tint i=0;\n\twhile(str[i]){ write(1,&str[i],1); i++; }\n}`,
hints:['✅ Loop while(str[i]) y write de cada carácter.','💡 Alternativa: calcula el len primero y haz write(1, str, len) en una llamada.','⚠️ Sin newline al final — solo imprime los caracteres del string.'],
ejemplo:`ft_putstr("Hello!"); // imprime: Hello!`},

{id:'ft_strlen',level:1,title:'ft_strlen',
enunciado:`Reproduce el comportamiento de strlen.
Prototipo: int ft_strlen(char *str);
Archivo: ft_strlen.c`,
sol:`int\tft_strlen(char *str)\n{\n\tint i=0;\n\twhile(str[i]) i++;\n\treturn(i);\n}`,
hints:['🔢 Contador i que avanza mientras str[i] != \'\\0\'.','📌 Devuelve i — ese es el número de caracteres sin contar el \\0.','⚠️ No necesitas ningún #include para esta función.'],
ejemplo:`ft_strlen("hello") // → 5`},

{id:'ft_strcpy',level:1,title:'ft_strcpy',
enunciado:`Reproduce el comportamiento de strcpy.
Prototipo: char *ft_strcpy(char *dest, char *src);
Copia src en dest incluyendo el \\0 final. Devuelve dest.
Archivo: ft_strcpy.c`,
sol:`char\t*ft_strcpy(char *dest, char *src)\n{\n\tint i=0;\n\twhile(src[i]){ dest[i]=src[i]; i++; }\n\tdest[i]='\\0';\n\treturn(dest);\n}`,
hints:['🔄 Copia carácter a carácter mientras src[i] != \'\\0\'.','⚠️ No olvides copiar el \'\\0\' final: dest[i] = \'\\0\' después del loop.','↩️ Devuelve dest (el puntero original al destino).'],
ejemplo:`char buf[10]; ft_strcpy(buf, "hello"); // buf = "hello"`},

{id:'ft_swap',level:1,title:'ft_swap',
enunciado:`Escribe una función que intercambia los valores de dos ints usando punteros.
Prototipo: void ft_swap(int *a, int *b);
Archivo: ft_swap.c`,
sol:`void\tft_swap(int *a, int *b)\n{\n\tint tmp;\n\ttmp=*a; *a=*b; *b=tmp;\n}`,
hints:['📦 Variable temporal: tmp = *a; *a = *b; *b = tmp;','🔑 Trabaja con *a y *b (derreferencia), no con a y b directamente.','⚠️ Es void — no necesitas return.'],
ejemplo:`int a=5, b=10; ft_swap(&a, &b); // a=10, b=5`},

{id:'search_and_replace',level:1,title:'search_and_replace',
enunciado:`Escribe un programa que recibe 3 argumentos: una cadena, un char a buscar y un char de reemplazo. Muestra la cadena con todas las ocurrencias reemplazadas.
• argc debe ser 4 (programa + 3 args).
• argv[2] y argv[3] son strings — usa solo el primer char.
Archivo: search_and_replace.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==4)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c==argv[2][0]) c=argv[3][0];\n\t\t\twrite(1,&c,1);\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['📌 argc debe ser exactamente 4.','🔍 Para cada char: si c == argv[2][0] → imprime argv[3][0]; si no → imprime c.','⚠️ argv[2] y argv[3] son strings; usa [0] para el primer carácter.'],
ejemplo:`$> ./search_and_replace "hello world" o 0\nhell0 w0rld`},

{id:'ulstr',level:1,title:'ulstr',
enunciado:`Escribe un programa que recibe una cadena y muestra cada letra alternando MAYÚSCULA/minúscula (posición 0→mayúscula, 1→minúscula, 2→mayúscula...).
• No-alfabéticos: sin modificar (pero SÍ cuentan como posición).
• Sin argumentos: solo newline.
Archivo: ulstr.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(i%2==0){ if(c>='a'&&c<='z') c-=32; }\n\t\t\telse{ if(c>='A'&&c<='Z') c+=32; }\n\t\t\twrite(1,&c,1);\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔀 Par (i%2==0) → mayúscula (c-=32 si era minúscula). Impar → minúscula (c+=32 si era mayúscula).','⚠️ Los no-alfabéticos NO se modifican, pero SÍ incrementan i.','📌 "hello" → "HeLlO"'],
ejemplo:`$> ./ulstr "hello world"\nHeLlO WoRlD`},

{id:'alpha_mirror_l1',level:1,title:'alpha_mirror (abc)',
enunciado:`Escribe un programa que muestra el alfabeto con las letras en posición IMPAR en MAYÚSCULAS y las pares en minúsculas.
• a(0)=minúscula, b(1)=MAYÚSCULA, c(2)=minúscula...
• Sin saltos entre letras, solo un newline al final.
Resultado: aBcDeFgHiJkLmNoPqRsTuVwXyZ
Archivo: alpha_mirror.c`,
sol:`#include <unistd.h>\n\nint\tmain(void)\n{\n\tchar c;\n\tint i=0;\n\twhile(i<26)\n\t{\n\t\tif(i%2==0) c='a'+i;\n\t\telse c='A'+i;\n\t\twrite(1,&c,1);\n\t\ti++;\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔡 Loop de 0 a 25. Si i%2==0 → minúscula (\'a\'+i). Si no → mayúscula (\'A\'+i).','📌 Resultado: aBcDeFgHiJkLmNoPqRsTuVwXyZ','⚠️ Sin espacios entre letras, solo un \\n al final.'],
ejemplo:`$> ./alpha_mirror\naBcDeFgHiJkLmNoPqRsTuVwXyZ`},

{id:'last_word',level:2,title:'last_word',
enunciado:`Escribe un programa que recibe una cadena y muestra su última palabra seguida de newline.
• Separadores: espacio y tab.
• Sin argumentos o sin palabras: solo newline.
Archivo: last_word.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i,end;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i]) i++;\n\t\ti--;\n\t\twhile(i>=0&&(argv[1][i]==' '||argv[1][i]=='\\t')) i--;\n\t\tend=i;\n\t\twhile(i>=0&&argv[1][i]!=' '&&argv[1][i]!='\\t') i--;\n\t\ti++;\n\t\twhile(i<=end){ write(1,&argv[1][i],1); i++; }\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['↩️ Ve al final, salta trailing spaces, retrocede hasta el inicio de la última palabra.','📍 Guarda el índice del final (end), imprime desde i+1 hasta end.','📌 "hello world  " → "world"'],
ejemplo:`$> ./last_word "hello world  "\nworld`},

{id:'ft_strcmp',level:2,title:'ft_strcmp',
enunciado:`Reproduce el comportamiento de strcmp.
Prototipo: int ft_strcmp(char *s1, char *s2);
Devuelve 0 si iguales, <0 si s1 < s2, >0 si s1 > s2.
Archivo: ft_strcmp.c`,
sol:`int\tft_strcmp(char *s1, char *s2)\n{\n\tint i=0;\n\twhile(s1[i]&&s2[i]&&s1[i]==s2[i]) i++;\n\treturn((unsigned char)s1[i]-(unsigned char)s2[i]);\n}`,
hints:['🔄 Avanza mientras ambos strings tienen chars y son iguales.','↩️ Devuelve la diferencia del primer char diferente: s1[i] - s2[i].','📌 Usa (unsigned char) para evitar problemas con chars > 127.'],
ejemplo:`ft_strcmp("abc","abc") // 0\nft_strcmp("abc","abd") // -1`},

{id:'do_op',level:2,title:'do_op',
enunciado:`Escribe un programa que recibe: número, operador, número. Realiza la operación y muestra el resultado.
• Operadores: + - * / %
• argc debe ser 4. Sin argumentos: solo newline.
• División entera. Comprueba división por cero.
Archivo: do_op.c`,
sol:`#include <unistd.h>\n#include <stdlib.h>\n\nvoid\tputnbr(int n)\n{\n\tchar c;\n\tif(n<0){ write(1,"-",1); n=-n; }\n\tif(n>=10) putnbr(n/10);\n\tc='0'+n%10; write(1,&c,1);\n}\n\nint\tmain(int argc, char **argv)\n{\n\tint a,b,res; char op;\n\tif(argc==4)\n\t{\n\t\ta=atoi(argv[1]); op=argv[2][0]; b=atoi(argv[3]);\n\t\tif(op=='+') res=a+b;\n\t\telse if(op=='-') res=a-b;\n\t\telse if(op=='*') res=a*b;\n\t\telse if(op=='/'&&b!=0) res=a/b;\n\t\telse if(op=='%'&&b!=0) res=a%b;\n\t\telse{ write(1,"\\n",1); return(0); }\n\t\tputnbr(res);\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['📦 Usa atoi() de <stdlib.h> para convertir argv a int.','⚠️ División/módulo por cero: si b==0, imprime solo newline.','🔢 Implementa putnbr para imprimir el resultado sin printf.'],
ejemplo:`$> ./do_op 10 + 5\n15\n$> ./do_op 10 / 0\n`},

{id:'ft_atoi',level:2,title:'ft_atoi',
enunciado:`Reproduce el comportamiento de atoi.
Prototipo: int ft_atoi(char *str);
• Ignora whitespace inicial (space, \\t, \\n, \\r, \\f, \\v)
• Maneja signo + o -
• Convierte dígitos hasta el primer no-dígito.
Archivo: ft_atoi.c`,
sol:`int\tft_atoi(char *str)\n{\n\tint i=0,sign=1,result=0;\n\twhile(str[i]==' '||str[i]=='\\t'||str[i]=='\\n'||\n\t\tstr[i]=='\\r'||str[i]=='\\f'||str[i]=='\\v') i++;\n\tif(str[i]=='+'||str[i]=='-')\n\t{ if(str[i]=='-') sign=-1; i++; }\n\twhile(str[i]>='0'&&str[i]<='9')\n\t{ result=result*10+(str[i]-'0'); i++; }\n\treturn(result*sign);\n}`,
hints:['🔢 3 fases: 1) salta whitespace, 2) detecta signo, 3) convierte dígitos.','📌 Whitespace: space, \\t, \\n, \\r, \\f, \\v — los 6.','↩️ result = result * 10 + (str[i] - \'0\') — fórmula clásica de acumulación.'],
ejemplo:`ft_atoi("  -42abc") // → -42\nft_atoi("+100")    // → 100`},

{id:'ft_strdup',level:2,title:'ft_strdup',
enunciado:`Reproduce el comportamiento de strdup usando malloc.
Prototipo: char *ft_strdup(char *src);
• Reserva memoria suficiente para copiar src.
• Devuelve un puntero a la nueva cadena (NULL si malloc falla).
Archivo: ft_strdup.c`,
sol:`#include <stdlib.h>\n\nchar\t*ft_strdup(char *src)\n{\n\tint len=0,i;\n\tchar *dest;\n\twhile(src[len]) len++;\n\tdest=(char*)malloc(sizeof(char)*(len+1));\n\tif(!dest) return(NULL);\n\ti=0;\n\twhile(src[i]){ dest[i]=src[i]; i++; }\n\tdest[i]='\\0';\n\treturn(dest);\n}`,
hints:['📦 malloc(len + 1) — el +1 es para el \'\\0\' final.','🔄 Calcula la longitud primero, luego malloc, luego copia carácter a carácter.','⚠️ Comprueba si malloc devuelve NULL antes de usar el puntero.'],
ejemplo:`char *s = ft_strdup("hello"); // s apunta a una copia nueva de "hello"`},

{id:'max',level:2,title:'max',
enunciado:`Escribe una función que devuelve el valor máximo de un array de ints.
Prototipo: int max(int *arr, int len);
Archivo: max.c`,
sol:`int\tmax(int *arr, int len)\n{\n\tint i,m;\n\tif(len<=0) return(0);\n\tm=arr[0]; i=1;\n\twhile(i<len){ if(arr[i]>m) m=arr[i]; i++; }\n\treturn(m);\n}`,
hints:['📌 Inicializa max con arr[0], NO con 0 (podría haber solo negativos).','🔄 Recorre desde i=1 comparando con el máximo actual.','⚠️ Si len <= 0, devuelve 0.'],
ejemplo:`int a[]={3,1,9,4,5}; max(a,5); // → 9`},

{id:'wdmatch',level:2,title:'wdmatch',
enunciado:`Escribe un programa que recibe dos strings. Muestra la primera si todos sus chars aparecen en la segunda en el mismo orden (subsecuencia).
• Si coincide → imprime s1. Si no → solo newline.
Archivo: wdmatch.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i=0,j=0;\n\tif(argc==3)\n\t{\n\t\twhile(argv[1][i]&&argv[2][j])\n\t\t{ if(argv[1][i]==argv[2][j]) i++; j++; }\n\t\tif(!argv[1][i])\n\t\t{ i=0; while(argv[1][i]) write(1,&argv[1][i++],1); }\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔍 Dos índices: i recorre s1, j recorre s2. i avanza solo cuando hay coincidencia.','✅ Si argv[1][i] == \'\\0\' al final, todos los chars de s1 fueron encontrados.','📌 "ftn" en "function" → "ftn" ✓'],
ejemplo:`$> ./wdmatch "ftn" "function"\nftn\n$> ./wdmatch "xyz" "hello"\n`},

{id:'camel_to_snake',level:2,title:'camel_to_snake',
enunciado:`Escribe un programa que convierte camelCase a snake_case.
• Cada mayúscula → '_' + minúscula.
• Sin argumentos: solo newline.
Archivo: camel_to_snake.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c>='A'&&c<='Z'){ write(1,"_",1); c+=32; }\n\t\t\twrite(1,&c,1);\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔡 Por cada char: si es mayúscula, escribe \'_\' y luego la minúscula (c + 32).','📌 "helloWorld" → "hello_world"','⚠️ Sin argumentos: solo newline.'],
ejemplo:`$> ./camel_to_snake "helloWorld"\nhello_world`},

{id:'snake_to_camel',level:2,title:'snake_to_camel',
enunciado:`Escribe un programa que convierte snake_case a camelCase.
• Cada '_' + letra → se elimina el '_' y la letra pasa a mayúscula.
• Sin argumentos: solo newline.
Archivo: snake_to_camel.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tif(argv[1][i]=='_'&&argv[1][i+1])\n\t\t\t{ i++; c=argv[1][i]-32; write(1,&c,1); }\n\t\t\telse write(1,&argv[1][i],1);\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔡 Si encuentras \'_\', salta al siguiente char y conviértelo a mayúscula (c - 32).','📌 "hello_world" → "helloWorld"','⚠️ Comprueba que el char después de \'_\' existe antes de acceder.'],
ejemplo:`$> ./snake_to_camel "hello_world"\nhelloWorld`},

{id:'ft_strcspn',level:2,title:'ft_strcspn',
enunciado:`Reproduce el comportamiento de strcspn.
Prototipo: size_t ft_strcspn(const char *s, const char *reject);
Devuelve la longitud del segmento inicial de s que NO contiene ningún char de reject.
Archivo: ft_strcspn.c`,
sol:`int\tft_strcspn(const char *s, const char *reject)\n{\n\tint i=0,j;\n\twhile(s[i])\n\t{\n\t\tj=0;\n\t\twhile(reject[j]){ if(s[i]==reject[j]) return(i); j++; }\n\t\ti++;\n\t}\n\treturn(i);\n}`,
hints:['🔍 Para cada char de s, comprueba si está en reject. Si está → devuelve i.','📌 "hello!world" con reject="!" → 5 (hasta el \'!\').','↩️ Si no hay coincidencia, devuelve la longitud total de s.'],
ejemplo:`ft_strcspn("hello!world","!") // → 5`},

{id:'ft_strspn',level:2,title:'ft_strspn',
enunciado:`Reproduce el comportamiento de strspn.
Prototipo: size_t ft_strspn(const char *s, const char *accept);
Devuelve la longitud del segmento inicial de s formado SOLO por chars de accept.
Archivo: ft_strspn.c`,
sol:`int\tft_strspn(const char *s, const char *accept)\n{\n\tint i=0,j,found;\n\twhile(s[i])\n\t{\n\t\tfound=0; j=0;\n\t\twhile(accept[j]){ if(s[i]==accept[j]) found=1; j++; }\n\t\tif(!found) return(i);\n\t\ti++;\n\t}\n\treturn(i);\n}`,
hints:['🔍 Opuesto a strcspn: avanza mientras el char SÍ está en accept.','📌 "hello" con accept="helo" → 5 (todos los chars están en accept).','↩️ Si todos los chars están en accept, devuelve la longitud de s.'],
ejemplo:`ft_strspn("hello world","helo") // → 4 (espacio no está en accept)`},

{id:'ft_strrev',level:2,title:'ft_strrev',
enunciado:`Escribe una función que invierte un string in-place.
Prototipo: char *ft_strrev(char *str);
Modifica el string original y lo devuelve.
Archivo: ft_strrev.c`,
sol:`char\t*ft_strrev(char *str)\n{\n\tint len=0,i; char tmp;\n\twhile(str[len]) len++;\n\ti=0;\n\twhile(i<len/2)\n\t{ tmp=str[i]; str[i]=str[len-1-i]; str[len-1-i]=tmp; i++; }\n\treturn(str);\n}`,
hints:['📐 Calcula la longitud, luego intercambia str[i] y str[len-1-i].','🔁 Loop hasta i < len/2 (punto medio).','↩️ Devuelve str (el mismo puntero, modificado in-place).'],
ejemplo:`ft_strrev("hello") // → "olleh"`},

{id:'print_bits',level:2,title:'print_bits',
enunciado:`Escribe una función que recibe un byte (unsigned char) y muestra su representación en binario (8 bits), empezando por el bit más significativo.
Prototipo: void print_bits(unsigned char octet);
Archivo: print_bits.c`,
sol:`#include <unistd.h>\n\nvoid\tprint_bits(unsigned char octet)\n{\n\tint i=7;\n\tunsigned char bit;\n\twhile(i>=0)\n\t{ bit=(octet>>i)&1; bit+='0'; write(1,&bit,1); i--; }\n}`,
hints:['🔢 (octet >> i) & 1 extrae el bit en posición i (de 7 a 0).','📌 Empieza en i=7 (bit más significativo) y baja hasta i=0.','🔡 bit + \'0\' convierte 0/1 al carácter \'0\'/\'1\'.'],
ejemplo:`print_bits(2);  // → 00000010\nprint_bits(42); // → 00101010`},

{id:'reverse_bits',level:2,title:'reverse_bits',
enunciado:`Escribe una función que invierte los bits de un byte y devuelve el resultado.
Prototipo: unsigned char reverse_bits(unsigned char octet);
Archivo: reverse_bits.c`,
sol:`unsigned char\treverse_bits(unsigned char octet)\n{\n\tunsigned char result=0;\n\tint i=0;\n\twhile(i<8)\n\t{ result=(result<<1)|(octet&1); octet>>=1; i++; }\n\treturn(result);\n}`,
hints:['🔢 Extrae el bit menos significativo de octet con (octet & 1) y ponlo en result.','🔁 En cada iteración: result <<= 1 para hacer espacio, luego OR con el bit extraído.','📌 00000001 → 10000000'],
ejemplo:`reverse_bits(1) // 00000001 → 10000000 = 128`},

{id:'swap_bits',level:2,title:'swap_bits',
enunciado:`Escribe una función que intercambia los 4 bits altos y los 4 bits bajos de un byte.
Prototipo: unsigned char swap_bits(unsigned char octet);
Archivo: swap_bits.c`,
sol:`unsigned char\tswap_bits(unsigned char octet)\n{\n\treturn((octet>>4)|(octet<<4));\n}`,
hints:['🔢 (octet >> 4) mueve los 4 bits altos a posición baja.','🔢 (octet << 4) mueve los 4 bits bajos a posición alta.','📌 OR de ambas: 0b10110001 → 0b00011011.'],
ejemplo:`swap_bits(0xF0) // 11110000 → 00001111 = 0x0F`},

{id:'is_power_of_2',level:2,title:'is_power_of_2',
enunciado:`Escribe una función que comprueba si un número es potencia de 2.
Prototipo: int is_power_of_2(unsigned int n);
Devuelve 1 si es potencia de 2, 0 si no.
Archivo: is_power_of_2.c`,
sol:`int\tis_power_of_2(unsigned int n)\n{\n\tif(n==0) return(0);\n\treturn((n&(n-1))==0);\n}`,
hints:['⚡ Truco bit a bit: n & (n-1) == 0 si y solo si n es potencia de 2.','📌 Potencias de 2 en binario tienen exactamente UN bit a 1: 1, 10, 100...','⚠️ El 0 NO es potencia de 2 — comprueba ese caso primero.'],
ejemplo:`is_power_of_2(4) // → 1\nis_power_of_2(5) // → 0`},

{id:'alpha_mirror_l2',level:2,title:'alpha_mirror (espejo)',
enunciado:`Escribe un programa que recibe una cadena y reemplaza cada letra por su "espejo" en el alfabeto (a↔z, b↔y, c↔x...).
• Respeta mayúsculas/minúsculas. No-alfabéticos: igual.
• Sin argumentos: solo newline.
Archivo: alpha_mirror.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c>='a'&&c<='z') c='z'-(c-'a');\n\t\t\telse if(c>='A'&&c<='Z') c='Z'-(c-'A');\n\t\t\twrite(1,&c,1);\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔡 Fórmula: \'z\'-(c-\'a\') para minúsculas, \'Z\'-(c-\'A\') para mayúsculas.','📌 a↔z, b↔y, c↔x: posición desde el inicio = posición desde el final.','📌 "Hello" → "Svool"'],
ejemplo:`$> ./alpha_mirror "Hello"\nSvool`},

{id:'ft_list_size',level:3,title:'ft_list_size',
enunciado:`Escribe una función que devuelve el número de elementos de una lista enlazada.
typedef struct s_list { struct s_list *next; void *data; } t_list;
Prototipo: int ft_list_size(t_list *begin_list);
Archivo: ft_list_size.c`,
sol:`typedef struct\ts_list\n{\n\tstruct s_list\t*next;\n\tvoid\t\t*data;\n}\tt_list;\n\nint\tft_list_size(t_list *begin_list)\n{\n\tint count=0;\n\twhile(begin_list){ count++; begin_list=begin_list->next; }\n\treturn(count);\n}`,
hints:['🔗 Recorre la lista con un puntero: mientras no sea NULL, incrementa el contador.','📌 begin_list = begin_list->next avanza al siguiente nodo.','↩️ Devuelve count al final.'],
ejemplo:`// Lista: A -> B -> C -> NULL\nft_list_size(lista) // → 3`},

{id:'ft_range',level:3,title:'ft_range',
enunciado:`Escribe una función que devuelve un array de ints con todos los valores entre min (incluido) y max (excluido).
Prototipo: int *ft_range(int min, int max);
• Si min >= max → devuelve NULL.
Archivo: ft_range.c`,
sol:`#include <stdlib.h>\n\nint\t*ft_range(int min, int max)\n{\n\tint *arr,size,i;\n\tif(min>=max) return(NULL);\n\tsize=max-min;\n\tarr=(int*)malloc(sizeof(int)*size);\n\tif(!arr) return(NULL);\n\ti=0;\n\twhile(i<size){ arr[i]=min+i; i++; }\n\treturn(arr);\n}`,
hints:['📦 malloc(sizeof(int) * (max - min)) — tamaño = diferencia entre max y min.','🔢 arr[i] = min + i — rellena de min hasta max-1.','⚠️ Si min >= max, devuelve NULL directamente sin malloc.'],
ejemplo:`ft_range(1,5) // → {1,2,3,4}`},

{id:'ft_rrange',level:3,title:'ft_rrange',
enunciado:`Igual que ft_range pero en orden inverso (de max-1 a min).
Prototipo: int *ft_rrange(int min, int max);
• Si min >= max → devuelve NULL.
Archivo: ft_rrange.c`,
sol:`#include <stdlib.h>\n\nint\t*ft_rrange(int min, int max)\n{\n\tint *arr,size,i;\n\tif(min>=max) return(NULL);\n\tsize=max-min;\n\tarr=(int*)malloc(sizeof(int)*size);\n\tif(!arr) return(NULL);\n\ti=0;\n\twhile(i<size){ arr[i]=max-1-i; i++; }\n\treturn(arr);\n}`,
hints:['📦 Mismo tamaño que ft_range: max - min.','🔄 arr[i] = max - 1 - i — empieza en max-1 y baja.','📌 ft_rrange(1,5) → {4,3,2,1}'],
ejemplo:`ft_rrange(1,5) // → {4,3,2,1}`},

{id:'pgcd',level:3,title:'pgcd',
enunciado:`Escribe un programa que recibe dos números enteros positivos y muestra su MCD (máximo común divisor), seguido de newline.
Archivo: pgcd.c`,
sol:`#include <unistd.h>\n#include <stdlib.h>\n\nvoid\tputnbr(int n){ char c; if(n>=10) putnbr(n/10); c='0'+n%10; write(1,&c,1); }\n\nint\tpgcd(int a, int b){ if(b==0) return(a); return(pgcd(b,a%b)); }\n\nint\tmain(int argc, char **argv)\n{\n\tif(argc==3) putnbr(pgcd(atoi(argv[1]),atoi(argv[2])));\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['📐 Algoritmo de Euclides: pgcd(a,b) = pgcd(b, a%b). Caso base: b==0 → devuelve a.','🔢 Llama recursivamente hasta que b == 0.','📌 pgcd(48,18) → pgcd(18,12) → pgcd(12,6) → pgcd(6,0) → 6'],
ejemplo:`$> ./pgcd 48 18\n6`},

{id:'lcm',level:3,title:'lcm',
enunciado:`Escribe un programa que recibe dos números y muestra su MCM (mínimo común múltiplo), seguido de newline.
Archivo: lcm.c`,
sol:`#include <unistd.h>\n#include <stdlib.h>\n\nvoid\tputnbr(long n){ char c; if(n>=10) putnbr(n/10); c='0'+n%10; write(1,&c,1); }\nlong\tgcd(long a,long b){ if(b==0) return(a); return(gcd(b,a%b)); }\n\nint\tmain(int argc, char **argv)\n{\n\tlong a,b;\n\tif(argc==3)\n\t{\n\t\ta=atol(argv[1]); b=atol(argv[2]);\n\t\tif(a==0||b==0) putnbr(0);\n\t\telse putnbr((a/gcd(a,b))*b);\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['📐 LCM(a,b) = (a / GCD(a,b)) * b — divide primero para evitar overflow.','🔢 Implementa GCD con Euclides primero, luego úsalo.','⚠️ Si a o b es 0, el LCM es 0.'],
ejemplo:`$> ./lcm 4 6\n12`},

{id:'tab_mult',level:3,title:'tab_mult',
enunciado:`Escribe una función que crea y devuelve una tabla de multiplicar de tamaño size×size usando malloc.
Prototipo: int **tab_mult(int size);
• tab[i][j] = (i+1) * (j+1)
• Si size <= 0 → devuelve NULL.
Archivo: tab_mult.c`,
sol:`#include <stdlib.h>\n\nint\t**tab_mult(int size)\n{\n\tint **tab,i,j;\n\tif(size<=0) return(NULL);\n\ttab=(int**)malloc(sizeof(int*)*size);\n\tif(!tab) return(NULL);\n\ti=0;\n\twhile(i<size)\n\t{\n\t\ttab[i]=(int*)malloc(sizeof(int)*size);\n\t\tif(!tab[i]) return(NULL);\n\t\tj=0;\n\t\twhile(j<size){ tab[i][j]=(i+1)*(j+1); j++; }\n\t\ti++;\n\t}\n\treturn(tab);\n}`,
hints:['📦 Doble malloc: primero para el array de punteros, luego para cada fila.','🔢 tab[i][j] = (i+1)*(j+1) — índices empiezan en 0 pero multiplicación en 1.','⚠️ Comprueba el retorno de cada malloc.'],
ejemplo:`// size=3: tab[0]={1,2,3}, tab[1]={2,4,6}, tab[2]={3,6,9}`},

{id:'ft_atoi_base',level:3,title:'ft_atoi_base',
enunciado:`Escribe una función que convierte un número en una base dada a int.
Prototipo: int ft_atoi_base(char *str, char *base);
• Base inválida si: < 2 chars, chars repetidos, contiene '+', '-' o espacios.
• str puede tener whitespace y signos iniciales (como ft_atoi).
Archivo: ft_atoi_base.c`,
sol:`int\tvalid_base(char *b)\n{\n\tint i=0,j,len=0;\n\twhile(b[len]) len++;\n\tif(len<2) return(0);\n\twhile(b[i])\n\t{ if(b[i]=='+'||b[i]=='-'||b[i]==' ') return(0);\n\t  j=i+1; while(b[j]){ if(b[i]==b[j]) return(0); j++; } i++; }\n\treturn(1);\n}\nint\tget_val(char c,char *b)\n{ int i=0; while(b[i]){ if(b[i]==c) return(i); i++; } return(-1); }\nint\tft_atoi_base(char *str, char *base)\n{\n\tint i=0,sign=1,result=0,len=0,v;\n\tif(!valid_base(base)) return(0);\n\twhile(base[len]) len++;\n\twhile(str[i]==' '||str[i]=='\\t'||str[i]=='\\n') i++;\n\twhile(str[i]=='+'||str[i]=='-'){ if(str[i]=='-') sign*=-1; i++; }\n\twhile((v=get_val(str[i],base))>=0){ result=result*len+v; i++; }\n\treturn(result*sign);\n}`,
hints:['🔍 Valida la base: mínimo 2 chars, sin repetidos, sin +/-/espacio.','🔢 Para cada char de str, busca su posición en la base → ese es su valor.','📌 result = result * base_len + valor_digit (como atoi pero con otra base).'],
ejemplo:`ft_atoi_base("ff","0123456789abcdef") // → 255\nft_atoi_base("10","01")               // → 2`},

{id:'str_capitalizer',level:3,title:'str_capitalizer',
enunciado:`Escribe un programa que capitaliza la primera letra de cada palabra y pone el resto en minúsculas.
• Separadores: espacio, tab y similares.
• Sin argumentos: solo newline.
Archivo: str_capitalizer.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i,nw; char c;\n\tif(argc==2)\n\t{\n\t\ti=0; nw=1;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c==' '||c=='\\t'||c=='\\n') nw=1;\n\t\t\telse if(nw){ if(c>='a'&&c<='z') c-=32; nw=0; }\n\t\t\telse if(c>='A'&&c<='Z') c+=32;\n\t\t\twrite(1,&c,1); i++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🚩 Flag nw (new_word): 1 al inicio y tras separador. 0 después del primer char de cada palabra.','🔡 Si nw=1 y el char es letra → mayúscula y pon nw=0. Si nw=0 → minúscula.','📌 "hello world" → "Hello World"'],
ejemplo:`$> ./str_capitalizer "hello world foo"\nHello World Foo`},

{id:'rstr_capitalizer',level:3,title:'rstr_capitalizer',
enunciado:`Escribe un programa que capitaliza la ÚLTIMA letra de cada palabra y pone el resto en minúsculas.
• Separadores: espacio, tab.
• Sin argumentos: solo newline.
Archivo: rstr_capitalizer.c`,
sol:`#include <unistd.h>\n\nint\tis_sep(char c){ return(c==' '||c=='\\t'||c=='\\n'||!c); }\n\nint\tmain(int argc, char **argv)\n{\n\tint i; char c;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tc=argv[1][i];\n\t\t\tif(c>='A'&&c<='Z') c+=32;\n\t\t\tif(!is_sep(c)&&is_sep(argv[1][i+1]))\n\t\t\t{ if(c>='a'&&c<='z') c-=32; }\n\t\t\twrite(1,&c,1); i++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔡 Primero convierte todo a minúsculas. Luego, si el siguiente char es separador/\\0 → mayúscula.','📌 "hello world" → "hellO worlD"','⚠️ El \'\\0\' cuenta como separador para el último char de la cadena.'],
ejemplo:`$> ./rstr_capitalizer "hello world"\nhellO worlD`},

{id:'hidenp',level:3,title:'hidenp',
enunciado:`Escribe un programa que recibe dos strings. Muestra s1 si sus chars aparecen en s2 en el mismo orden (subsecuencia oculta).
• Si coincide → imprime s1. Si no → solo newline.
Archivo: hidenp.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i=0,j=0;\n\tif(argc==3)\n\t{\n\t\twhile(argv[1][i]&&argv[2][j])\n\t\t{ if(argv[1][i]==argv[2][j]) i++; j++; }\n\t\tif(!argv[1][i])\n\t\t{ i=0; while(argv[1][i]) write(1,&argv[1][i++],1); }\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔍 Igual que wdmatch: i solo avanza cuando hay coincidencia.','✅ Si argv[1][i] == \'\\0\' al final → s1 está oculta en s2.','📌 "fct" en "function" → "fct" ✓'],
ejemplo:`$> ./hidenp "fct" "function"\nfct\n$> ./hidenp "abc" "xyz"\n`},

{id:'epur_str',level:3,title:'epur_str',
enunciado:`Escribe un programa que recibe una cadena y la muestra sin espacios extra (un solo espacio entre palabras, sin espacios al inicio ni al final).
• Sin argumentos: solo newline.
Archivo: epur_str.c`,
sol:`#include <unistd.h>\n\nint\tmain(int argc, char **argv)\n{\n\tint i,space;\n\tif(argc==2)\n\t{\n\t\ti=0; space=0;\n\t\twhile(argv[1][i]==' '||argv[1][i]=='\\t') i++;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tif(argv[1][i]==' '||argv[1][i]=='\\t') space=1;\n\t\t\telse{ if(space) write(1," ",1); space=0; write(1,&argv[1][i],1); }\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🚩 Flag space: al encontrar separador → space=1. Al siguiente char no-separador → imprime espacio y pon space=0.','📌 Salta los espacios iniciales antes del loop principal.','📌 "  hello   world  " → "hello world"'],
ejemplo:`$> ./epur_str "  hello   world  "\nhello world`},

{id:'expand_str',level:3,title:'expand_str',
enunciado:`Escribe un programa que recibe una cadena y la muestra con 3 espacios entre cada carácter no-espacio. Los espacios de la cadena original se reemplazan por 6 espacios.
• Sin argumentos: solo newline.
Archivo: expand_str.c`,
sol:`#include <unistd.h>\n\nvoid\tspaces(int n){ while(n--) write(1," ",1); }\n\nint\tmain(int argc, char **argv)\n{\n\tint i;\n\tif(argc==2)\n\t{\n\t\ti=0;\n\t\twhile(argv[1][i])\n\t\t{\n\t\t\tif(argv[1][i]==' ') spaces(6);\n\t\t\telse{ write(1,&argv[1][i],1); if(argv[1][i+1]) spaces(3); }\n\t\t\ti++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['📐 Por cada char: si es espacio → 6 espacios. Si no → imprime char + 3 espacios (excepto el último).','⚠️ No añadas los 3 espacios después del último carácter.','📌 "ab c" → "a   b      c"'],
ejemplo:`$> ./expand_str "ab c"\na   b      c`},

{id:'ft_split',level:4,title:'ft_split',
enunciado:`Escribe una función que divide una cadena en función de un charset de separadores.
Prototipo: char **ft_split(char *str, char *charset);
• Cada char de charset es un separador.
• Devuelve array de strings terminado en NULL.
• Sin strings vacías en el resultado.
Archivo: ft_split.c`,
sol:`#include <stdlib.h>\n\nint\tis_sep(char c,char *cs){ int i=0; while(cs[i]){ if(cs[i++]==c) return(1); } return(0); }\nint\tcount_words(char *s,char *cs)\n{ int c=0,in=0,i=0; while(s[i]){ if(!is_sep(s[i],cs)&&!in){c++;in=1;} else if(is_sep(s[i],cs)) in=0; i++; } return(c); }\nchar\t*get_word(char *s,char *cs,int *i)\n{ int st,len=0,j; char *w;\n  while(s[*i]&&is_sep(s[*i],cs)) (*i)++;\n  st=*i; while(s[*i]&&!is_sep(s[*i],cs)){(*i)++;len++;}\n  w=(char*)malloc(len+1); if(!w) return(NULL);\n  j=0; while(j<len){w[j]=s[st+j];j++;} w[j]='\\0'; return(w); }\n\nchar\t**ft_split(char *str, char *charset)\n{\n\tchar **res; int words,i=0,j=0;\n\twords=count_words(str,charset);\n\tres=(char**)malloc(sizeof(char*)*(words+1));\n\tif(!res) return(NULL);\n\twhile(j<words){ res[j]=get_word(str,charset,&i); j++; }\n\tres[j]=NULL;\n\treturn(res);\n}`,
hints:['🔢 3 funciones: is_sep, count_words, get_word. Divídelo en partes.','📦 malloc(words+1) para el array — el +1 es para el NULL final obligatorio.','⚠️ El NULL al final del array es obligatorio: result[words] = NULL.'],
ejemplo:`ft_split("hello world foo"," ") // → {"hello","world","foo",NULL}`},

{id:'flood_fill',level:4,title:'flood_fill',
enunciado:`Escribe una función que realiza un flood fill en una matriz de chars.
Prototipo: void flood_fill(char **tab, t_point size, t_point begin);
typedef struct { int x; int y; } t_point;
• Reemplaza todos los chars conectados al punto begin (mismo char) con 'F'.
• Conectividad: 4 direcciones.
Archivo: flood_fill.c`,
sol:`typedef struct s_point { int x; int y; } t_point;\n\nvoid\tflood_fill(char **tab, t_point size, t_point begin)\n{\n\tchar target; t_point p;\n\ttarget=tab[begin.y][begin.x];\n\tif(target=='F') return;\n\ttab[begin.y][begin.x]='F';\n\tif(begin.x>0){ p.x=begin.x-1;p.y=begin.y; if(tab[p.y][p.x]==target) flood_fill(tab,size,p); }\n\tif(begin.x<size.x-1){ p.x=begin.x+1;p.y=begin.y; if(tab[p.y][p.x]==target) flood_fill(tab,size,p); }\n\tif(begin.y>0){ p.x=begin.x;p.y=begin.y-1; if(tab[p.y][p.x]==target) flood_fill(tab,size,p); }\n\tif(begin.y<size.y-1){ p.x=begin.x;p.y=begin.y+1; if(tab[p.y][p.x]==target) flood_fill(tab,size,p); }\n}`,
hints:['🔁 Recursión: guarda target = tab[y][x]. Marca como \'F\'. Llama a los 4 vecinos si tienen el mismo target.','⚠️ Comprueba límites ANTES de acceder a vecinos (x>0, x<size.x-1, etc.).','📌 tab[y][x] — primero y (fila), luego x (columna).'],
ejemplo:`// Matriz: {".##",".#.","..."} con begin(0,0) → rellena '.' conectados con 'F'`},

{id:'fprime',level:4,title:'fprime',
enunciado:`Escribe un programa que recibe un número y muestra sus factores primos en orden ascendente, separados por '*'.
• Si el argumento es 1 → muestra "1".
• Sin argumentos: solo newline.
Archivo: fprime.c`,
sol:`#include <unistd.h>\n#include <stdlib.h>\n\nvoid\tputnbr(int n){ char c; if(n>=10) putnbr(n/10); c='0'+n%10; write(1,&c,1); }\n\nint\tmain(int argc, char **argv)\n{\n\tint n,div,first;\n\tif(argc==2)\n\t{\n\t\tn=atoi(argv[1]); div=2; first=1;\n\t\tif(n==1) write(1,"1",1);\n\t\telse while(n>1)\n\t\t{\n\t\t\tif(n%div==0)\n\t\t\t{ if(!first) write(1,"*",1); putnbr(div); n/=div; first=0; }\n\t\t\telse div++;\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['🔢 Empieza con divisor=2. Divide n entre el divisor mientras sea divisible. Luego incrementa el divisor.','📌 No necesitas comprobar si el divisor es primo — el algoritmo lo garantiza.','⚠️ Caso especial: n=1 → imprime "1" directamente.'],
ejemplo:`$> ./fprime 12\n2*2*3\n$> ./fprime 13\n13`},

{id:'ft_itoa',level:4,title:'ft_itoa',
enunciado:`Escribe una función que convierte un int a su representación en string usando malloc.
Prototipo: char *ft_itoa(int n);
• Maneja negativos y el INT_MIN (-2147483648).
Archivo: ft_itoa.c`,
sol:`#include <stdlib.h>\n\nint\tdigit_count(long n)\n{ int c; if(n<=0){c=1;n=-n;}else c=0; while(n>0){c++;n/=10;} return(c); }\n\nchar\t*ft_itoa(int n)\n{\n\tlong num=(long)n; int len=digit_count(num);\n\tchar *str=(char*)malloc(len+1);\n\tif(!str) return(NULL);\n\tstr[len]='\\0';\n\tif(num<0){ str[0]='-'; num=-num; }\n\tif(num==0){ str[0]='0'; return(str); }\n\twhile(num>0){ str[--len]='0'+(num%10); num/=10; }\n\treturn(str);\n}`,
hints:['📦 Calcula cuántos dígitos tiene n, luego malloc ese tamaño + 1.','⚠️ Usa long para manejar INT_MIN (-2147483648) sin overflow al cambiar de signo.','🔢 Rellena de derecha a izquierda: str[--len] = \'0\' + (n%10); n/=10.'],
ejemplo:`ft_itoa(42)    // → "42"\nft_itoa(-100)  // → "-100"\nft_itoa(0)     // → "0"`},

{id:'sort_int_tab',level:4,title:'sort_int_tab',
enunciado:`Escribe una función que ordena un array de ints en orden ascendente.
Prototipo: void sort_int_tab(int *tab, int size);
Modifica el array original (in-place).
Archivo: sort_int_tab.c`,
sol:`void\tsort_int_tab(int *tab, int size)\n{\n\tint i=0,j,tmp;\n\twhile(i<size-1)\n\t{\n\t\tj=0;\n\t\twhile(j<size-1-i)\n\t\t{ if(tab[j]>tab[j+1]){ tmp=tab[j]; tab[j]=tab[j+1]; tab[j+1]=tmp; } j++; }\n\t\ti++;\n\t}\n}`,
hints:['🫧 Bubble sort: dos bucles anidados. Si tab[j] > tab[j+1], intercámbialos.','📌 El bucle interno va hasta size-1-i (los últimos i ya están ordenados).','⚠️ Devuelve void — modifica el array in-place.'],
ejemplo:`int a[]={5,3,1,4,2}; sort_int_tab(a,5); // → {1,2,3,4,5}`},

{id:'rev_wstr',level:4,title:'rev_wstr',
enunciado:`Escribe un programa que recibe una cadena y muestra sus palabras en orden inverso, separadas por espacios.
• Sin argumentos: solo newline.
Archivo: rev_wstr.c`,
sol:`#include <unistd.h>\n\nint\tis_sep(char c){ return(c==' '||c=='\\t'); }\n\nint\tmain(int argc, char **argv)\n{\n\tint i,end,first,j;\n\tif(argc==2)\n\t{\n\t\ti=0; while(argv[1][i]) i++; i--;\n\t\tfirst=1;\n\t\twhile(i>=0)\n\t\t{\n\t\t\twhile(i>=0&&is_sep(argv[1][i])) i--;\n\t\t\tif(i<0) break;\n\t\t\tend=i;\n\t\t\twhile(i>=0&&!is_sep(argv[1][i])) i--;\n\t\t\tif(!first) write(1," ",1);\n\t\t\tfirst=0;\n\t\t\tj=i+1;\n\t\t\twhile(j<=end){ write(1,&argv[1][j],1); j++; }\n\t\t}\n\t}\n\twrite(1,"\\n",1);\n\treturn(0);\n}`,
hints:['↩️ Ve al final. Repite: salta separadores → guarda end → retrocede al inicio de la palabra → imprime.','📌 Flag first: evita poner espacio antes de la primera palabra.','📌 "hello world foo" → "foo world hello"'],
ejemplo:`$> ./rev_wstr "hello world foo"\nfoo world hello`},
];

const TOTAL=EX.length;
const LEVELS=[1,2,3,4];
const LC={1:'var(--l1)',2:'var(--l2)',3:'var(--l3)',4:'var(--l4)'};
const LN={1:'Nivel 1',2:'Nivel 2',3:'Nivel 3',4:'Nivel 4'};
const LL={1:'Básico',2:'Intermedio',3:'Avanzado',4:'Experto'};
let done=JSON.parse(localStorage.getItem('42exam_done_v2')||'[]');
let curId=null;

function save(){ localStorage.setItem('42exam_done_v2',JSON.stringify(done)); }
function markDone(id){ if(!done.includes(id)){done.push(id);save();} renderSidebar();updateProgress();renderDoneBtn(id); }
function unmark(id){ done=done.filter(d=>d!==id);save();renderSidebar();updateProgress();renderDoneBtn(id); }
function renderDoneBtn(id){
  const btn=document.getElementById('doneBtn'); if(!btn) return;
  if(done.includes(id)){ btn.className='btn btn-done'; btn.innerHTML='✓ Completado'; btn.onclick=()=>unmark(id); }
  else{ btn.className='btn btn-primary'; btn.textContent='✅ Marcar completado'; btn.onclick=()=>markDone(id); }
}
function updateProgress(){
  const pct=Math.round((done.length/TOTAL)*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=done.length+' / '+TOTAL;
}
function renderSidebar(){
  const sb=document.getElementById('sidebar'); sb.innerHTML='';
  LEVELS.forEach(lv=>{
    const exs=EX.filter(e=>e.level===lv);
    const dc=exs.filter(e=>done.includes(e.id)).length;
    const div=document.createElement('div'); div.className='level-section';
    div.innerHTML=`<div class="level-header"><div class="level-dot" style="background:${LC[lv]}"></div>${LN[lv]}<span style="margin-left:auto;color:var(--muted);font-size:10px">${dc}/${exs.length}</span></div>`;
    exs.forEach(ex=>{
      const btn=document.createElement('button');
      btn.className='ex-btn'+(curId===ex.id?' active':'')+(done.includes(ex.id)?' done':'');
      btn.textContent=(done.includes(ex.id)?'✓ ':'')+ex.title;
      btn.onclick=()=>showEx(ex.id);
      div.appendChild(btn);
    });
    sb.appendChild(div);
  });
}
function showHome(){
  curId=null; renderSidebar();
  document.getElementById('mainContent').innerHTML=`
    <div class="home-title">Exam Rank 02<br><span>Full Practice</span></div>
    <p class="home-desc">${TOTAL} ejercicios — Niveles 1 al 4. Enunciados, 3 pistas y solución oculta.<br>
    <strong style="color:var(--accent)">Tip:</strong> intenta resolverlo antes de mirar las pistas. ¡Tú puedes!</p>
    <div class="level-cards">${LEVELS.map(lv=>{
      const exs=EX.filter(e=>e.level===lv);
      const dc=exs.filter(e=>done.includes(e.id)).length;
      return `<div class="level-card" onclick="showEx('${exs[0].id}')" style="border-top:3px solid ${LC[lv]}">
        <div class="lc-l" style="color:${LC[lv]}">NIVEL ${lv}</div>
        <div class="lc-name">${exs.length} ejercicios</div>
        <div class="lc-count">${dc}/${exs.length} completados</div>
        <div class="lc-badge" style="background:${LC[lv]}22;color:${LC[lv]}">${LL[lv]}</div>
      </div>`;
    }).join('')}</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:2px;">Estructura del examen</div>
      <div style="font-size:13px;line-height:2.2;">
        📋 <strong style="color:var(--accent)">4 ejercicios</strong>, uno de cada nivel.<br>
        ✅ Nivel 1 y 2 son casi seguros — practica todos.<br>
        🔁 <strong style="color:var(--accent)">3 intentos</strong> por ejercicio con grademe.<br>
        ⏱️ <strong style="color:var(--accent)">3 horas</strong> en total.<br>
        🚫 Sin internet, sin IA — solo tú y el editor.
      </div>
    </div>`;
}
let hintsShown=0;
function nextHint(total){
  if(hintsShown<total){ document.getElementById('hint_'+hintsShown).style.display='block'; hintsShown++; }
  else{ for(let i=0;i<total;i++){const e=document.getElementById('hint_'+i);if(e)e.style.display='none';} hintsShown=0; }
  const btn=document.getElementById('hintsBtn');
  if(btn) btn.textContent=hintsShown<total?`💡 Pista ${hintsShown}/${total} mostrada — click para la siguiente`:`💡 Todas las pistas mostradas — click para ocultar`;
}
function toggleSol(){
  const b=document.getElementById('solutionBlock'),btn=document.getElementById('solBtn');
  if(b.style.display==='none'){ b.style.display='block'; btn.textContent='🔓 Ocultar solución'; }
  else{ b.style.display='none'; btn.textContent='🔒 Mostrar solución'; }
}
function copySol(){
  navigator.clipboard.writeText(document.getElementById('solCode').textContent).then(()=>{
    const btn=document.querySelector('.copy-btn'); btn.textContent='¡Copiado!';
    setTimeout(()=>btn.textContent='Copiar',1500);
  });
}
function showEx(id){
  curId=id; hintsShown=0; renderSidebar();
  const ex=EX.find(e=>e.id===id);
  const lvc=LC[ex.level];
  const idx=EX.findIndex(e=>e.id===id);
  const prev=EX[idx-1], next=EX[idx+1];
  document.getElementById('mainContent').innerHTML=`
    <div class="ex-breadcrumb">
      <span style="cursor:pointer;color:var(--accent)" onclick="showHome()">🏠 Inicio</span>
      <span>›</span><span>Nivel ${ex.level}</span><span>›</span>
      <span style="color:var(--text)">${ex.title}</span>
    </div>
    <div class="ex-header">
      <div class="ex-title">${ex.title}</div>
      <div class="level-badge" style="background:${lvc}22;color:${lvc};border:1px solid ${lvc}44">Nivel ${ex.level}</div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-icon">📋</span> ENUNCIADO</div>
      <div class="section-body">
        <div class="enunciado">${ex.enunciado}</div>
        ${ex.ejemplo?`<div style="margin-top:16px;"><div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;">EJEMPLO</div><div class="code-block"><pre>${ex.ejemplo}</pre></div></div>`:''}
      </div>
    </div>
    <div class="hints-wrap">
      <button class="hints-toggle" id="hintsBtn" onclick="nextHint(${ex.hints.length})">
        💡 Click para revelar pista 1/${ex.hints.length}
      </button>
      ${ex.hints.map((h,i)=>`<div class="hint-item" id="hint_${i}">${h}</div>`).join('')}
    </div>
    <div class="section">
      <div class="section-header"><span class="section-icon">🔒</span> SOLUCIÓN <span style="margin-left:auto;font-size:10px;color:var(--muted)">Intenta antes de mirar</span></div>
      <div class="section-body">
        <div id="solutionBlock" style="display:none" class="code-block">
          <button class="copy-btn" onclick="copySol()">Copiar</button>
          <pre id="solCode">${ex.sol}</pre>
        </div>
        <button class="btn btn-secondary" id="solBtn" onclick="toggleSol()">🔒 Mostrar solución</button>
      </div>
    </div>
    <div class="nav-btns">
      ${prev?`<button class="btn btn-secondary" onclick="showEx('${prev.id}')">← ${prev.title}</button>`:'<span></span>'}
      <button class="btn" id="doneBtn"></button>
      ${next?`<button class="btn btn-secondary" onclick="showEx('${next.id}')">${next.title} →</button>`:''}
    </div>`;
  renderDoneBtn(id);
  window.scrollTo(0,0);
}
showHome(); updateProgress();
</script>
</body>
</html>
